<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etch A Sketch</title>
  <link rel="stylesheet" href="styles.css">
  <script src="javascript.js" defer></script>
</head>
<body>
  <div class="input">
    <button class="open-modal">Change Grid</button>
    <div class="modal">
      <form class="modal-content">
        <label for="grid-input">Enter your custom grid size:</label>
        <input id="grid-input" name= "grid-input" type="number" min="1" max="100" required>
        <input id="grid-submit" type="submit">
      
        <span class="close">&times;</span>
      </form>
    </div>
    
  </div>
  <div class="grid">
    
  </div>
</body>
</html>
